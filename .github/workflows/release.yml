name: Build and Release Android APK

# Este workflow será executado apenas quando você enviar uma tag que comece com 'v' (ex: v1.0, v2.1.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17 (Padrão para projetos Android atuais)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Conceder permissão de execução para o Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Fazer o build do APK (Release)
        run: ./gradlew assembleRelease

      - name: Criar Release no GitHub e fazer upload do APK
        uses: softprops/action-gh-release@v2
        with:
          # Caminho padrão onde o APK de release não assinado é gerado. 
          # Se o seu módulo não se chamar 'app', altere esse caminho.
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
